<style>
  :root {
    --accent:    #A100FF;
    --spine:     #4A00B4;
    --ink:       #1c1c28;
    --ink-soft:  #5b5b6b;
    --ink-faint: #9494a3;
    --bg:        #F5F5F7;
    --panel:     #ffffff;
    --hair:      #e6e6ee;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 32px; background: #fff;
    border-bottom: 1px solid var(--hair);
    box-shadow: 0 1px 6px rgba(20,20,40,.06);
  }
  .topbar-brand { display: flex; align-items: center; gap: 9px; }
  .topbar-brand .chev { color: var(--accent); font-size: 22px; font-weight: 900; }
  .topbar-brand .name { font-weight: 800; font-size: 16px; letter-spacing: -.02em; }
  .topbar-title { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .topbar-meta  { font-size: 12px; color: var(--ink-faint); }

  main { max-width: 1080px; margin: 0 auto; padding: 48px 32px 96px; }

  .agent-section {
    margin-bottom: 72px; background: var(--panel);
    border: 1px solid var(--hair); border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 2px rgba(20,20,40,.04), 0 4px 20px rgba(20,20,40,.05);
  }
  .agent-header { padding: 28px 32px 20px; border-bottom: 1px solid var(--hair); }
  .phase-tag {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
  }
  .agent-header h2 { font-size: 20px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 10px; }
  .exec-intro { font-size: 14px; line-height: 1.6; color: var(--ink-soft); max-width: 680px; }

  .agent-body { padding: 24px 32px 32px; }

  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 20px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--ink-soft); }
  .legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .svg-wrap svg { display: block; width: 100%; }

  /* Tooltip */
  .flow-tooltip {
    position: fixed; pointer-events: none; z-index: 999;
    background: #fff; border: 1px solid var(--hair); border-radius: 8px;
    box-shadow: 0 4px 20px rgba(20,20,40,.14);
    padding: 13px 16px; min-width: 200px; max-width: 300px;
    opacity: 0; transform: translateY(4px);
    transition: opacity 120ms ease, transform 120ms ease;
  }
  .flow-tooltip.visible { opacity: 1; transform: translateY(0); }
  .tt-label { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .tt-tech  {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: .04em;
    background: rgba(161,0,255,0.09); color: #6B00C4;
    padding: 2px 8px; border-radius: 99px; margin-bottom: 8px;
  }
  .tt-type  {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: .05em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 99px; color: #fff; margin-left: 5px; margin-bottom: 8px;
  }
  .tt-note  { font-size: 11.5px; color: var(--ink-soft); line-height: 1.55; }

  /* ── Present mode (URL: ?present) ── */
  body.present { background: #fff; }
  body.present main { max-width: 1200px; padding: 32px 48px 80px; }
  body.present .agent-section { margin-bottom: 96px; scroll-margin-top: 76px; }
  body.present .agent-header { padding: 32px 40px 24px; }
  body.present .agent-header h2 { font-size: 30px; }
  body.present .phase-tag { font-size: 12px; }
  body.present .exec-intro { font-size: 19px; line-height: 1.65; max-width: none; color: var(--ink); }
  body.present .agent-body { padding: 28px 40px 44px; }
  body.present .legend-item { font-size: 14px; }
  body.present .legend-dot { width: 13px; height: 13px; }
  /* prev / next nav — hidden unless present mode */
  .present-nav { display: none; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  body.present .present-nav { display: flex; }
  .present-nav a {
    font-size: 13px; font-weight: 700; color: var(--accent);
    text-decoration: none; padding: 5px 14px;
    background: rgba(161,0,255,0.07); border: 1.5px solid rgba(161,0,255,0.22);
    border-radius: 6px; transition: background 140ms;
  }
  .present-nav a:hover { background: rgba(161,0,255,0.16); }
  /* back link in topbar — hidden unless present mode */
  .topbar-back {
    display: none; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 700; color: var(--ink-soft);
    text-decoration: none;
  }
  .topbar-back:hover { color: var(--ink); }
  body.present .topbar-back { display: flex; }
  body.present .topbar-meta { display: none; }
</style>

        note: "Those learnings are written into the reference database — so any future product that resembles this one starts with this launch's real performance as its analog baseline.",
        type: "data", tech: "MemTree Persistent Memory" },
      { label: "Forecast models recalibrated",
        note: "With the library updated, model weights are adjusted based on what actually drove accuracy this cycle — the models get quantifiably smarter with each completed launch.",
        type: "transform", tech: "Online Model Retraining" },
      { label: "Next launch starts smarter",
        note: "Because of that recalibration, every future NPI opens with a baseline already shaped by real experience — accuracy compounds cycle over cycle rather than restarting from scratch.",
        type: "boundary", tech: "Baseline Calibration" },
    ],
  },

];

// ─── ENGINE ─────────────────────────────────────────────────────────────────

const TYPE_COLORS = {
  data:      "#A100FF",
  transform: "#7B00CC",
  human:     "#00A3E0",
  boundary:  "#00875A",
  decision:  "#FF6900",
};
const TYPE_ICONS = { data:"⬇", transform:"⚙", human:"👤", boundary:"↗", decision:"◆" };

function typeColor(t) { return TYPE_COLORS[t] || "#888"; }
function typeIcon(t)  { return TYPE_ICONS[t]  || "○"; }

function svgEl(tag, attrs) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, String(v));
  return el;
}

/* -- Tooltip -- */
const TT = (() => {
  const el   = document.getElementById("tooltip");
  const lbl  = document.getElementById("tt-label");
  const tech = document.getElementById("tt-tech");
  const type = document.getElementById("tt-type");
  const note = document.getElementById("tt-note");
  function pos(x, y) {
    const W = el.offsetWidth || 240, H = el.offsetHeight || 100;
    const ox = 14, oy = 14;
    let lx = x + ox, ly = y + oy;
    if (lx + W > window.innerWidth  - 8) lx = x - W - ox;
    if (ly + H > window.innerHeight - 8) ly = y - H - oy;
    el.style.left = lx + "px"; el.style.top = ly + "px";
  }
  document.addEventListener("mousemove", e => { if (el.classList.contains("visible")) pos(e.clientX, e.clientY); });
  return {
    show(step, x, y) {
      lbl.textContent  = step.label;
      tech.textContent = step.tech || "";
      tech.style.display = step.tech ? "" : "none";
      type.textContent = step.type;
      type.style.background = typeColor(step.type);
      note.textContent = step.note || "";
      el.classList.add("visible");
      el.setAttribute("aria-hidden", "false");
      pos(x, y);
    },
    hide() { el.classList.remove("visible"); el.setAttribute("aria-hidden", "true"); }
  };
})();

/* -- Node renderer -- */
function renderNode(svg, step, idx, cx, cy, R) {
  const color = typeColor(step.type);
  const g = svgEl("g", { class: "flow-node", style: "cursor:pointer", tabindex: "0",
    role: "img", "aria-label": "Step " + (idx + 1) + ": " + step.label });
  g.appendChild(svgEl("circle", { cx, cy, r: R + 3, fill: "rgba(20,20,40,0.09)", filter: "blur(3px)" }));
  g.appendChild(svgEl("circle", { cx, cy, r: R, fill: color, stroke: "#fff", "stroke-width": "2.5" }));
  const icon = svgEl("text", { x: cx, y: cy - Math.round(R * 0.22),
    "text-anchor":"middle","dominant-baseline":"middle",
    "font-size": Math.round(R * 0.62), fill:"#fff", style:"pointer-events:none;user-select:none;" });
  icon.textContent = typeIcon(step.type);
  g.appendChild(icon);
  const num = svgEl("text", { x: cx, y: cy + Math.round(R * 0.46),
    "text-anchor":"middle","dominant-baseline":"middle",
    "font-size": Math.round(R * 0.44), "font-weight":"700",
    fill:"rgba(255,255,255,0.80)", style:"pointer-events:none;user-select:none;" });
  num.textContent = idx + 1;
  g.appendChild(num);
  function onEnter(e) { TT.show(step, e.clientX, e.clientY); }
  g.addEventListener("mouseenter", onEnter);
  g.addEventListener("mouseleave", () => TT.hide());
  g.addEventListener("focus",  e => { const r = g.getBoundingClientRect(); TT.show(step, r.right, r.top); });
  g.addEventListener("blur",   () => TT.hide());
  svg.appendChild(g);
}

/* -- Label + tech-tag renderer -- */
function renderLabel(svg, step, x, yBase, above, fontSz) {
  const fs     = fontSz || 12;
  const fsTech = Math.max(8, fs - 2);
  const g      = svgEl("g", { style: "pointer-events:none;" });

  if (above) {
    const labelY = yBase - 4;
    const techY  = labelY - fs - 5;
    const lbl = svgEl("text", { x, y: labelY,
      "text-anchor":"middle", "dominant-baseline":"auto",
      "font-size": fs, "font-weight":"600", fill:"#1c1c28" });
    lbl.textContent = step.label;
    g.appendChild(lbl);
    if (step.tech) renderTechPill(g, step.tech, x, techY, fsTech, true);
  } else {
    const labelY = yBase + 4;
    const techY  = labelY + fs + 5;
    const lbl = svgEl("text", { x, y: labelY,
      "text-anchor":"middle", "dominant-baseline":"hanging",
      "font-size": fs, "font-weight":"600", fill:"#1c1c28" });
    lbl.textContent = step.label;
    g.appendChild(lbl);
    if (step.tech) renderTechPill(g, step.tech, x, techY, fsTech, false);
  }

  svg.appendChild(g);
}

/* Approximate-width pill */
function renderTechPill(g, techStr, cx, y, fs, above) {
  const estW  = Math.min(techStr.length * fs * 0.54 + 16, 190);
  const pillH = fs + 7;
  const pillX = cx - estW / 2;
  const pillY = above ? y - pillH + 2 : y;

  g.appendChild(svgEl("rect", {
    x: pillX, y: pillY, width: estW, height: pillH, rx: pillH / 2,
    fill: "rgba(161,0,255,0.08)"
  }));
  const txt = svgEl("text", {
    x: cx, y: pillY + pillH / 2,
    "text-anchor":"middle", "dominant-baseline":"middle",
    "font-size": fs, "font-weight":"600",
    fill: "#6B00C4", style:"letter-spacing:0.02em;"
  });
  txt.textContent = techStr;
  g.appendChild(txt);
}

/* -- Racetrack renderer -- */
function renderRacetrack(svg, steps) {
  svg.innerHTML = "";
  const N = steps.length;
  if (!N) return;

  const containerW = svg.parentElement.clientWidth || 900;
  const PRESENT   = document.body.classList.contains("present");
  const PSCALE    = PRESENT ? 1.9 : 1;

  const COLS    = Math.max(2, Math.ceil(N / 3));
  const ROWS    = Math.ceil(N / COLS);
  const NODE_R  = Math.max(12, Math.round(24 - N * 0.45)) * PSCALE | 0;
  const ROW_H   = Math.max(96, Math.round((140 - N * 2) * (PRESENT ? 1.55 : 1)));
  const ARC_R   = ROW_H / 2;
  const PAD_X   = ARC_R + 28;
  const FONT_LG = Math.max(9, Math.round(13 - N * 0.18)) * PSCALE | 0;
  const TECH_H  = FONT_LG + 12;
  const PAD_TOP = (PRESENT ? 72 : 56) + TECH_H;
  const PAD_BOT = (PRESENT ? 72 : 56) + TECH_H;
  const INSET   = NODE_R + 22;

  const leftEdge      = PAD_X;
  const rightEdge     = containerW - PAD_X;
  const nodeAreaLeft  = leftEdge  + INSET;
  const nodeAreaRight = rightEdge - INSET;
  const nodeSpan      = nodeAreaRight - nodeAreaLeft;
  const totalH        = PAD_TOP + (ROWS - 1) * ROW_H + PAD_BOT;

  const colX = Array.from({ length: COLS }, (_, c) =>
    COLS === 1 ? (nodeAreaLeft + nodeAreaRight) / 2
               : nodeAreaLeft + c * nodeSpan / (COLS - 1));
  const rowY = Array.from({ length: ROWS }, (_, r) => PAD_TOP + r * ROW_H);

  svg.setAttribute("viewBox", "0 0 " + containerW + " " + totalH);
  svg.setAttribute("height", totalH);
  svg.appendChild(svgEl("rect", { x:0, y:0, width:containerW, height:totalH, fill:"#ffffff" }));

  // Build continuous racetrack path
  let d = "M " + leftEdge + "," + rowY[0];
  for (let r = 0; r < ROWS; r++) {
    const goRight = (r % 2 === 0);
    d += " L " + (goRight ? rightEdge : leftEdge) + "," + rowY[r];
    if (r < ROWS - 1) {
      d += goRight
        ? " A " + ARC_R + " " + ARC_R + " 0 0 1 " + rightEdge + "," + rowY[r+1]
        : " A " + ARC_R + " " + ARC_R + " 0 0 0 " + leftEdge  + "," + rowY[r+1];
    }
  }

  svg.appendChild(svgEl("path", { d, stroke:"rgba(74,0,180,0.10)", "stroke-width":"14",
    fill:"none", "stroke-linecap":"round", "stroke-linejoin":"round" }));
  svg.appendChild(svgEl("path", { d, stroke:"#4A00B4", "stroke-width":"3.5",
    fill:"none", "stroke-linecap":"round", "stroke-linejoin":"round" }));

  // Node positions
  const positions = steps.map((_, i) => {
    const row = Math.floor(i / COLS);
    const posInRow = i % COLS;
    const goRight  = (row % 2 === 0);
    const colIdx   = goRight ? posInRow : (COLS - 1 - posInRow);
    return { cx: colX[colIdx], cy: rowY[row], row };
  });

  // Start / end caps
  svg.appendChild(svgEl("circle", { cx:leftEdge, cy:rowY[0], r:6,
    fill:"#A100FF", stroke:"#fff", "stroke-width":"2" }));
  const last = positions[N - 1];
  svg.appendChild(svgEl("circle", { cx:last.cx, cy:last.cy, r:6,
    fill:"#00875A", stroke:"#fff", "stroke-width":"2" }));

  // Labels drawn first (behind nodes)
  positions.forEach(({ cx, cy, row }, i) => {
    const above = (row % 2 === 0);
    renderLabel(svg, steps[i], cx, cy + (above ? -NODE_R : NODE_R), above, FONT_LG);
  });
  // Nodes on top
  positions.forEach(({ cx, cy }, i) => renderNode(svg, steps[i], i, cx, cy, NODE_R));
}

/* -- Legend builder -- */
function buildLegend(steps, container) {
  const seen = new Set();
  steps.forEach(s => {
    if (seen.has(s.type)) return;
    seen.add(s.type);
    const item = document.createElement("div");
    item.className = "legend-item";
    const dot = document.createElement("div");
    dot.className = "legend-dot";
    dot.style.background = typeColor(s.type);
    const lbl = document.createElement("span");
    lbl.textContent = s.type.charAt(0).toUpperCase() + s.type.slice(1);
    item.appendChild(dot); item.appendChild(lbl);
    container.appendChild(item);
  });
}

/* -- Page builder -- */
function buildPage() {
  const main = document.getElementById("main");
  AGENTS.forEach((agent, idx) => {
    const section = document.createElement("div");
    section.className = "agent-section";
    section.id = agent.id;

    const hdr = document.createElement("div");
    hdr.className = "agent-header";
    const phaseTag = document.createElement("div");
    phaseTag.className = "phase-tag";
    phaseTag.textContent = agent.phase;
    const h2 = document.createElement("h2");
    h2.textContent = agent.title;
    const intro = document.createElement("p");
    intro.className = "exec-intro";
    intro.textContent = agent.execIntro;
    // prev / next nav (only visible in present mode via CSS)
    const nav = document.createElement("div");
    nav.className = "present-nav";
    const prev = AGENTS[idx - 1], next = AGENTS[idx + 1];
    if (prev) { const a = document.createElement("a"); a.href = "#" + prev.id; a.textContent = "← " + prev.title; nav.appendChild(a); }
    if (next) { const a = document.createElement("a"); a.href = "#" + next.id; a.textContent = next.title + " →"; nav.appendChild(a); }
    hdr.appendChild(phaseTag); hdr.appendChild(h2); hdr.appendChild(intro); hdr.appendChild(nav);

    const body = document.createElement("div");
    body.className = "agent-body";
    const legend = document.createElement("div");
    legend.className = "legend";
    buildLegend(agent.steps, legend);
    const svgWrap = document.createElement("div");
    svgWrap.className = "svg-wrap";
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("aria-label", agent.title + " data flow");
    svgWrap.appendChild(svg);
    body.appendChild(legend); body.appendChild(svgWrap);

    section.appendChild(hdr); section.appendChild(body);
    main.appendChild(section);

    renderRacetrack(svg, agent.steps);
    const ro = new ResizeObserver(() => renderRacetrack(svg, agent.steps));
    ro.observe(svgWrap);
  });
}

buildPage();

// ── Present mode init ──────────────────────────────────────────────────────
(function () {
  if (!/[?&]present/.test(location.search)) return;
  document.body.classList.add("present");
  // Scroll to the agent section named in the hash, if any
  const hash = location.hash.slice(1);
  if (hash) {
    // Use two rAF frames so ResizeObserver has fired and SVGs are sized
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const el = document.getElementById(hash);
      if (el) el.scrollIntoView({ behavior: "instant", block: "start" });
    }));
  }
})();
</script>
