<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPI — Intelligent Automation Journey</title>
<style>
  /* ============================================================
     THEME TOKENS  — tweak the brand here
     ============================================================ */
  :root {
    --accent: #A100FF;            /* Accenture purple */
    --accent-soft: #f3e6ff;
    --accent-line: #d9b8ff;
    --planned: #0F9D8C;           /* teal/green for planned */
    --planned-soft: #e6f6f3;
    --ink: #1c1c28;
    --ink-soft: #5b5b6b;
    --ink-faint: #9494a3;
    --bar: #e9e9ef;
    --bar-ink: #3a3a47;
    --bg: #ffffff;
    --panel: #ffffff;
    --hair: #e6e6ee;
    --shadow: 0 1px 2px rgba(20,20,40,.06), 0 6px 20px rgba(20,20,40,.06);
    --col-w: 340px;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    color: var(--ink);
    background: #fafafd;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header.app {
    display: flex; align-items: center; gap: 20px;
    padding: 16px 28px;
    background: var(--bg);
    border-bottom: 1px solid var(--hair);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo {
    font-weight: 800; letter-spacing: -.02em; font-size: 19px;
    display: flex; align-items: center; gap: 6px; color: var(--ink);
  }
  .brand .logo .chev { color: var(--accent); font-size: 22px; line-height: 0; }
  .brand .client {
    font-size: 12px; color: var(--ink-soft); padding-left: 12px;
    border-left: 1px solid var(--hair);
  }
  .titles { margin-left: auto; text-align: right; }
  .titles h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  .titles p { margin: 2px 0 0; font-size: 12.5px; color: var(--ink-soft); }

  /* ---------- Toolbar / filters ---------- */
  .toolbar {
    position: sticky; top: 0; z-index: 40;
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
    padding: 12px 28px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--hair);
  }
  .tgroup { display: flex; align-items: center; gap: 8px; }
  .tgroup > .glabel {
    font-size: 11px; text-transform: uppercase; letter-spacing: .07em;
    color: var(--ink-faint); font-weight: 700;
  }

  /* segmented status control */
  .seg { display: inline-flex; border: 1px solid var(--hair); border-radius: 999px; overflow: hidden; background: #fff; }
  .seg button {
    border: 0; background: transparent; cursor: pointer;
    font: inherit; font-size: 12.5px; padding: 6px 14px; color: var(--ink-soft);
  }
  .seg button[aria-pressed="true"] { background: var(--accent); color: #fff; font-weight: 600; }

  /* capability filter chips */
  .capfilters { display: flex; flex-wrap: wrap; gap: 6px; }
  .capchip {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    border: 1px solid var(--hair); border-radius: 999px;
    padding: 5px 10px 5px 6px; font-size: 12px; background: #fff; color: var(--ink-soft);
    transition: all .15s ease; user-select: none;
  }
  .capchip .ic { width: 18px; height: 18px; display: inline-flex; }
  .capchip[aria-pressed="false"] { opacity: .4; filter: grayscale(1); }
  .capchip:hover { border-color: var(--accent-line); }

  .clearbtn {
    margin-left: auto; border: 1px solid var(--hair); background: #fff; cursor: pointer;
    font: inherit; font-size: 12.5px; color: var(--ink-soft); padding: 6px 12px; border-radius: 8px;
  }
  .clearbtn:hover { border-color: var(--accent-line); color: var(--accent); }
  .filterstat { font-size: 12px; color: var(--ink-faint); }

  /* ---------- Phase ruler (mini overview) ---------- */
  .ruler {
    position: sticky; top: 57px; z-index: 35;
    display: flex; gap: 6px; overflow-x: auto; padding: 10px 28px;
    background: #fff; border-bottom: 1px solid var(--hair); scrollbar-width: thin;
  }
  .ruler .pill {
    flex: 0 0 auto; cursor: pointer; border: 1px solid var(--hair); background: #fff;
    font: inherit; font-size: 11.5px; color: var(--ink-soft); padding: 4px 11px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .ruler .pill .n {
    width: 16px; height: 16px; border-radius: 50%; background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center;
  }
  .ruler .pill:hover { border-color: var(--accent-line); color: var(--accent); }

  /* ---------- Timeline ---------- */
  .scrollhint { padding: 8px 28px 0; font-size: 11.5px; color: var(--ink-faint); }
  .timeline-wrap { padding: 6px 28px 40px; }
  .timeline {
    display: flex; gap: 0; overflow-x: auto; padding-bottom: 18px;
    cursor: grab; scroll-behavior: smooth;
  }
  .timeline.grabbing { cursor: grabbing; scroll-behavior: auto; }
  .timeline::-webkit-scrollbar { height: 10px; }
  .timeline::-webkit-scrollbar-thumb { background: #d9d9e3; border-radius: 999px; }

  .col { flex: 0 0 var(--col-w); display: flex; flex-direction: column; padding: 0 8px; }

  /* phase bar */
  .bar {
    height: 54px; background: var(--bar); color: var(--bar-ink);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    text-align: center; font-weight: 700; font-size: 13.5px; padding: 6px 14px; line-height: 1.2;
  }

  /* numbered node row with continuous arrow */
  .node-wrap { position: relative; height: 46px; display: flex; align-items: center; justify-content: center; }
  .node-wrap::before {
    content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 3px;
    background: linear-gradient(90deg, #4f9bff, #9b5cff); transform: translateY(-50%);
  }
  .col:first-child .node-wrap::before { left: 50%; }
  .col:last-child  .node-wrap::after {
    content: ""; position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
    border-left: 9px solid #9b5cff; border-top: 6px solid transparent; border-bottom: 6px solid transparent;
  }
  .node {
    position: relative; z-index: 2; width: 26px; height: 26px; border-radius: 50%;
    background: #fff; border: 3px solid #7b6cff; color: #4a3fb5;
    font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 4px #fff;
  }

  .lane { display: flex; flex-direction: column; gap: 12px; padding-top: 16px; }
  .lane:empty::after {
    content: "—"; color: var(--ink-faint); text-align: center; font-size: 13px; padding-top: 8px;
  }

  /* ---------- Agent card ---------- */
  .card {
    position: relative; background: var(--panel); border-radius: var(--radius);
    border: 2px solid var(--accent); box-shadow: var(--shadow); padding: 13px 14px 14px;
    cursor: pointer; transition: opacity .2s ease, transform .15s ease, box-shadow .15s ease;
  }
  .card[data-status="planned"] { border-style: dashed; border-color: var(--planned); }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(20,20,40,.12); }
  .card:focus-visible { outline: 3px solid var(--accent-line); outline-offset: 2px; }
  .card.dimmed { opacity: .12; pointer-events: none; filter: grayscale(.6); }

  .card .toprow { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .badge {
    font-size: 9.5px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 5px; color: #fff;
  }
  .badge.opt {
    color: var(--ink-soft); background: #f0f0f5; border: 1px solid var(--hair); letter-spacing: .03em;
  }
  .status-dot { margin-left: auto; font-size: 10.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 5px; }
  .status-dot::before { content: ""; width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.deployed { color: var(--accent); }
  .status-dot.deployed::before { background: var(--accent); }
  .status-dot.planned { color: var(--planned); }
  .status-dot.planned::before { background: var(--planned); }

  .card h3 { margin: 0 0 5px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .card .desc {
    margin: 0; font-size: 12.5px; color: var(--ink-soft); line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .metric {
    margin-top: 9px; font-size: 12px; font-weight: 700; color: var(--planned);
  }
  .card[data-status="deployed"] .metric { color: var(--accent); }
  .card .caps { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
  .card .caps .ic {
    width: 22px; height: 22px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
    background: #f5f5fa; border: 1px solid var(--hair);
  }
  .card .caps .ic svg { width: 14px; height: 14px; }

  /* ---------- Legend ---------- */
  .legend {
    margin: 6px 28px 50px; padding: 16px 18px; background: #fff; border: 1px solid var(--hair);
    border-radius: var(--radius);
  }
  .legend h4 { margin: 0 0 12px; font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint); }
  .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px 22px; }
  .legend-item { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--ink-soft); }
  .legend-item .ic { width: 24px; height: 24px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; background: #f5f5fa; border: 1px solid var(--hair); flex: 0 0 auto; }
  .legend-item .ic svg { width: 15px; height: 15px; }
  .legend .types { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--hair); }

  /* ---------- Drawer ---------- */
  .scrim {
    position: fixed; inset: 0; background: rgba(20,20,40,.42); opacity: 0; pointer-events: none;
    transition: opacity .2s ease; z-index: 90;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: 440px; max-width: 92vw;
    background: #fff; box-shadow: -10px 0 40px rgba(20,20,40,.18); z-index: 100;
    transform: translateX(100%); transition: transform .22s ease; overflow-y: auto; padding: 26px 28px 40px;
  }
  .drawer.open { transform: translateX(0); }
  .drawer .close {
    position: absolute; top: 16px; right: 18px; border: 0; background: #f3f3f8; cursor: pointer;
    width: 32px; height: 32px; border-radius: 8px; font-size: 18px; color: var(--ink-soft);
  }
  .drawer .close:hover { background: #ececf3; color: var(--ink); }
  .drawer .d-badges { display: flex; gap: 8px; align-items: center; margin: 4px 0 14px; flex-wrap: wrap; }
  .drawer h2 { margin: 0 0 4px; font-size: 22px; letter-spacing: -.02em; }
  .drawer .d-phase { font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
  .drawer .d-desc { font-size: 14px; line-height: 1.6; color: var(--ink-soft); margin: 18px 0; }
  .drawer .d-metric {
    font-size: 15px; font-weight: 800; padding: 12px 14px; border-radius: 10px;
    background: var(--accent-soft); color: var(--accent); margin-bottom: 18px;
  }
  .drawer[data-status="planned"] .d-metric { background: var(--planned-soft); color: var(--planned); }
  .drawer .d-caps-title { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint); margin-bottom: 10px; font-weight: 700; }
  .drawer .d-cap { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--hair); font-size: 13.5px; color: var(--ink); }
  .drawer .d-cap .ic { width: 28px; height: 28px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; background: #f5f5fa; border: 1px solid var(--hair); flex: 0 0 auto; }
  .drawer .d-cap .ic svg { width: 17px; height: 17px; }

  @media (max-width: 720px) {
    header.app { flex-wrap: wrap; gap: 10px; }
    .titles { margin-left: 0; text-align: left; }
  }
</style>
</head>
<body>

<header class="app">
  <div class="brand">
    <span class="logo"><span class="chev">&gt;</span> accenture</span>
    <span class="client" id="clientName">Client · New Product Introduction</span>
  </div>
  <div class="titles">
    <h1 id="jTitle"></h1>
    <p id="jSub"></p>
  </div>
</header>

<div class="toolbar">
  <div class="tgroup">
    <span class="glabel">Status</span>
    <div class="seg" id="statusSeg" role="group" aria-label="Filter by status">
      <button data-status="all" aria-pressed="true">All</button>
      <button data-status="deployed" aria-pressed="false">Deployed</button>
      <button data-status="planned" aria-pressed="false">Planned</button>
    </div>
  </div>
  <div class="tgroup" style="flex:1 1 auto;">
    <span class="glabel">Capability</span>
    <div class="capfilters" id="capFilters"></div>
  </div>
  <span class="filterstat" id="filterStat"></span>
  <button class="clearbtn" id="clearBtn">Clear filters</button>
</div>

<div class="ruler" id="ruler" aria-label="Jump to phase"></div>

<p class="scrollhint">Drag, or hold <strong>Shift</strong> + scroll, to pan the timeline →</p>
<div class="timeline-wrap">
  <div class="timeline" id="timeline"></div>
</div>

<div class="legend">
  <h4>Capability legend</h4>
  <div class="legend-grid" id="legendGrid"></div>
  <div class="types" id="typeLegend"></div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" tabindex="-1">
  <button class="close" id="drawerClose" aria-label="Close">&times;</button>
  <div id="drawerBody"></div>
</aside>

  "best-in-class":'<path d="M12 3l2.6 5.3 5.9.8-4.3 4.1 1 5.8L12 16.9 6.8 19l1-5.8L3.5 9.1l5.9-.8L12 3z" fill="none" stroke="C" stroke-width="1.9" stroke-linejoin="round"/>',
  leapfrog:       '<path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z" fill="C" stroke="C" stroke-width="1" stroke-linejoin="round"/>',
  genai:          '<path d="M12 3l1.8 4.7L18.5 9l-4.7 1.3L12 15l-1.8-4.7L5.5 9l4.7-1.3L12 3z" fill="C"/><path d="M18.5 14l.9 2.3 2.3.9-2.3.7-.9 2.4-.9-2.4-2.3-.7 2.3-.9.9-2.3z" fill="C"/>',
};
function glyph(capId, color) {
  return '<svg viewBox="0 0 24 24" aria-hidden="true">' +
    (GLYPHS[capId] || '').replace(/C/g, color) + '</svg>';
}

const $ = (sel, root = document) => root.querySelector(sel);
const el = (tag, cls, html) => { const n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; };

// active filter state
const state = {
  status: "all",
  caps: new Set(Object.keys(CAPABILITIES)), // all on by default
};

function init() {
  // header
  $("#jTitle").textContent = JOURNEY.title || "";
  $("#jSub").textContent = JOURNEY.subtitle || "";
  if (JOURNEY.client) { $("#clientName").textContent = JOURNEY.client; }

  buildCapFilters();
  buildRuler();
  buildTimeline();
  buildLegend();
  wireToolbar();
  wireDrawer();
  wirePan();
  applyFilters();
}

function buildCapFilters() {
  const box = $("#capFilters");
  box.innerHTML = "";
  Object.entries(CAPABILITIES).forEach(([id, c]) => {
    const chip = el("button", "capchip");
    chip.type = "button";
    chip.setAttribute("aria-pressed", "true");
    chip.dataset.cap = id;
    chip.innerHTML = '<span class="ic">' + glyph(id, c.color) + '</span>' + c.label;
    chip.addEventListener("click", () => {
      const on = chip.getAttribute("aria-pressed") === "true";
      chip.setAttribute("aria-pressed", on ? "false" : "true");
      if (on) state.caps.delete(id); else state.caps.add(id);
      applyFilters();
    });
    box.appendChild(chip);
  });
}

function buildRuler() {
  const r = $("#ruler");
  r.innerHTML = "";
  JOURNEY.phases.forEach((p, i) => {
    const pill = el("button", "pill");
    pill.type = "button";
    pill.innerHTML = '<span class="n">' + (i + 1) + '</span>' + p.label;
    pill.addEventListener("click", () => {
      const col = document.getElementById("col-" + p.id);
      if (col) col.scrollIntoView({ behavior: "smooth", inline: "start", block: "nearest" });
    });
    r.appendChild(pill);
  });
}

function buildTimeline() {
  const tl = $("#timeline");
  tl.innerHTML = "";
  JOURNEY.phases.forEach((p, i) => {
    const col = el("div", "col");
    col.id = "col-" + p.id;

    col.appendChild(el("div", "bar", p.label));

    const nodeWrap = el("div", "node-wrap");
    nodeWrap.appendChild(el("div", "node", String(i + 1)));
    col.appendChild(nodeWrap);

    const lane = el("div", "lane");
    JOURNEY.agents
      .filter(a => a.phaseId === p.id)
      .forEach(a => lane.appendChild(buildCard(a)));
    col.appendChild(lane);

    tl.appendChild(col);
  });
}

function buildCard(a) {
  const t = NODE_TYPES[a.type] || { label: a.type, color: "#888" };
  const card = el("div", "card");
  card.tabIndex = 0;
  card.dataset.id = a.id;
  card.dataset.status = a.status;
  card.dataset.caps = (a.capabilities || []).join(" ");
  card.setAttribute("role", "button");
  card.setAttribute("aria-label", a.title + " — open detail");

  const caps = (a.capabilities || []).map(id => {
    const c = CAPABILITIES[id]; if (!c) return "";
    return '<span class="ic" title="' + c.label + '">' + glyph(id, c.color) + '</span>';
  }).join("");

  card.innerHTML =
    '<div class="toprow">' +
      '<span class="badge" style="background:' + t.color + '">' + t.label + '</span>' +
      (a.optional ? '<span class="badge opt">Optional</span>' : '') +
      '<span class="status-dot ' + a.status + '">' + (a.status === "deployed" ? "Deployed" : "Planned") + '</span>' +
    '</div>' +
    '<h3>' + a.title + '</h3>' +
    '<p class="desc">' + (a.description || "") + '</p>' +
    (a.metric ? '<div class="metric">' + a.metric + '</div>' : '') +
    (caps ? '<div class="caps">' + caps + '</div>' : '');

  card.addEventListener("click", () => openDrawer(a));
  card.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openDrawer(a); }
  });
  return card;
}

function buildLegend() {
  const grid = $("#legendGrid");
  grid.innerHTML = "";
  Object.entries(CAPABILITIES).forEach(([id, c]) => {
    const item = el("div", "legend-item",
      '<span class="ic">' + glyph(id, c.color) + '</span>' + c.label);
    grid.appendChild(item);
  });
  const types = $("#typeLegend");
  types.innerHTML = "";
  Object.values(NODE_TYPES).forEach(t => {
    types.appendChild(el("span", "badge", t.label)).style.background = t.color;
  });
}

function wireToolbar() {
  $("#statusSeg").addEventListener("click", e => {
    const btn = e.target.closest("button"); if (!btn) return;
    state.status = btn.dataset.status;
    [...e.currentTarget.children].forEach(b =>
      b.setAttribute("aria-pressed", b === btn ? "true" : "false"));
    applyFilters();
  });
  $("#clearBtn").addEventListener("click", () => {
    state.status = "all";
    state.caps = new Set(Object.keys(CAPABILITIES));
    [...$("#statusSeg").children].forEach(b =>
      b.setAttribute("aria-pressed", b.dataset.status === "all" ? "true" : "false"));
    document.querySelectorAll(".capchip").forEach(c => c.setAttribute("aria-pressed", "true"));
    applyFilters();
  });
}

function applyFilters() {
  const cards = document.querySelectorAll(".card");
  let hidden = 0;
  cards.forEach(card => {
    const okStatus = state.status === "all" || card.dataset.status === state.status;
    const cardCaps = card.dataset.caps ? card.dataset.caps.split(" ") : [];
    const okCaps = cardCaps.length === 0 || cardCaps.some(c => state.caps.has(c));
    const visible = okStatus && okCaps;
    card.classList.toggle("dimmed", !visible);
    if (!visible) hidden++;
  });
  const total = cards.length;
  const allCaps = state.caps.size === Object.keys(CAPABILITIES).length;
  const filtering = state.status !== "all" || !allCaps;
  $("#filterStat").textContent = filtering
    ? (total - hidden) + " of " + total + " shown"
    : total + " agents";
}

// ---- Drawer ----
let lastFocused = null;
function openDrawer(a) {
  lastFocused = document.activeElement;
  const t = NODE_TYPES[a.type] || { label: a.type, color: "#888" };
  const phase = JOURNEY.phases.find(p => p.id === a.phaseId);
  const body = $("#drawerBody");
  const capsFull = (a.capabilities || []).map(id => {
    const c = CAPABILITIES[id]; if (!c) return "";
    return '<div class="d-cap"><span class="ic">' + glyph(id, c.color) + '</span>' + c.label + '</div>';
  }).join("");

  body.innerHTML =
    '<div class="d-phase">' + (phase ? phase.label : "") + '</div>' +
    '<h2 id="drawerTitle">' + a.title + '</h2>' +
    '<div class="d-badges">' +
      '<span class="badge" style="background:' + t.color + '">' + t.label + '</span>' +
      (a.optional ? '<span class="badge opt">Optional</span>' : '') +
      '<span class="status-dot ' + a.status + '">' + (a.status === "deployed" ? "Deployed" : "Planned") + '</span>' +
    '</div>' +
    (a.metric ? '<div class="d-metric">' + a.metric + '</div>' : '') +
    '<p class="d-desc">' + (a.description || "") + '</p>' +
    (capsFull ? '<div class="d-caps-title">Capabilities</div>' + capsFull : '');

  const drawer = $("#drawer");
  drawer.dataset.status = a.status;
  drawer.classList.add("open");
  $("#scrim").classList.add("open");
  drawer.focus();
}
function closeDrawer() {
  $("#drawer").classList.remove("open");
  $("#scrim").classList.remove("open");
  if (lastFocused) lastFocused.focus();
}
function wireDrawer() {
  $("#drawerClose").addEventListener("click", closeDrawer);
  $("#scrim").addEventListener("click", closeDrawer);
  document.addEventListener("keydown", e => {
    if (e.key === "Escape" && $("#drawer").classList.contains("open")) closeDrawer();
  });
}

// ---- Drag-to-pan + shift-wheel horizontal scroll ----
function wirePan() {
  const tl = $("#timeline");
  let down = false, startX = 0, startScroll = 0, moved = false;
  tl.addEventListener("mousedown", e => {
    if (e.target.closest(".card")) return; // let cards handle clicks
    down = true; moved = false; startX = e.pageX; startScroll = tl.scrollLeft;
    tl.classList.add("grabbing");
  });
  window.addEventListener("mousemove", e => {
    if (!down) return;
    const dx = e.pageX - startX;
    if (Math.abs(dx) > 3) moved = true;
    tl.scrollLeft = startScroll - dx;
  });
  window.addEventListener("mouseup", () => { down = false; tl.classList.remove("grabbing"); });
  tl.addEventListener("wheel", e => {
    if (e.shiftKey || (Math.abs(e.deltaX) > Math.abs(e.deltaY))) return; // native horizontal
    if (e.deltaY !== 0) { tl.scrollLeft += e.deltaY; e.preventDefault(); }
  }, { passive: false });
}

init();
</script>
</body>
</html>
