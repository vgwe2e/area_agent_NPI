<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPI Decision Flow + Technology Foundation — v2A</title>
<style>
  /* ============================================================
     THEME TOKENS  — tweak the brand here
     ============================================================ */
  :root {
    --accent: #A100FF;            /* Accenture purple */
    --accent-soft: #f3e6ff;
    --accent-line: #d9b8ff;
    --teal: #0F9D8C;              /* shared teal/green primitive */
    --planned: var(--teal);       /* planned status */
    --planned-soft: #e6f6f3;
    --ink: #1c1c28;
    --ink-soft: #5b5b6b;
    --ink-faint: #6b6b7a;         /* darkened to ~5:1 on white for legibility (was #9494a3) */
    --bar: #e9e9ef;
    --bar-ink: #3a3a47;
    --bg: #ffffff;
    --panel: #ffffff;
    --hair: #e6e6ee;
    --shadow: 0 1px 2px rgba(20,20,40,.06), 0 6px 20px rgba(20,20,40,.06);
    --col-w: 360px;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    /* v12 encoding cues */
    --hsy-red: #E2231A;           /* PRE-LAUNCH / orchestrator */
    --launch-purple: #7500C0;     /* LAUNCH group */
    --post-green: var(--teal);    /* POST-LAUNCH group */
    --human: #2563EB;             /* HumanAgent / gate accent */
    --asset-ink: #0b6b54;         /* "Accenture asset" tag — ~5:1 on the gray bar */
    --aera-bg: #E1F5EE;
    --aera-line: #9FE1CB;
    --aera-ink: #0F6E56;
    --amber: #B26B00;             /* TRANSFORMED badge ink */
    --amber-pale: #FBF0DC;
    --blue: #0061C2;              /* ENABLED badge ink */
    --blue-pale: #E3F0FC;
    --from-bg: #f4f4f8;
    --to-bg: #f6ecff;
    --neutral-100: #f3f3f8;       /* subtle fills */
    --neutral-200: #ececf3;       /* subtle fill, hover */
    --neutral-300: #d9d9e3;       /* scrollbar thumb */
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
  body {
    font-family: var(--font);
    color: var(--ink);
    background: #fafafd;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header.app {
    display: flex; align-items: center; gap: 20px;
    padding: 16px 28px;
    background: var(--bg);
    border-bottom: 1px solid var(--hair);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .logo {
    font-weight: 800; letter-spacing: -.02em; font-size: 19px;
    display: flex; align-items: center; gap: 6px; color: var(--ink);
  }
  .brand .logo .chev { color: var(--accent); font-size: 22px; line-height: 0; }
  .brand .hsy {
    font-weight: 900; font-size: 15px; color: var(--hsy-red); letter-spacing: .5px;
    padding-left: 12px; border-left: 1px solid var(--hair);
  }
  .brand .client {
    font-size: 12px; color: var(--ink-soft); padding-left: 12px;
    border-left: 1px solid var(--hair);
  }
  .titles { margin-left: auto; text-align: right; }
  .titles h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  .titles p { margin: 2px 0 0; font-size: 12.5px; color: var(--ink-soft); }

  /* ---------- Toolbar / filters ---------- */
  .toolbar {
    position: sticky; top: 0; z-index: 40;
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px 18px;
    padding: 12px 28px;
    background: rgba(255,255,255,.97);
    border-bottom: 1px solid var(--hair);
  }
  .tgroup { display: flex; align-items: center; gap: 8px; }
  .tgroup > .glabel {
    font-size: 11px; text-transform: uppercase; letter-spacing: .07em;
    color: var(--ink-faint); font-weight: 700;
  }

  /* segmented status control */
  .seg { display: inline-flex; border: 1px solid var(--hair); border-radius: 999px; overflow: hidden; background: #fff; }
  .seg button {
    border: 0; background: transparent; cursor: pointer;
    font: inherit; font-size: 12.5px; padding: 6px 14px; color: var(--ink-soft);
  }
  .seg button[aria-pressed="true"] { background: var(--accent); color: #fff; font-weight: 600; }

  /* capability + class filter chips */
  .capfilters { display: flex; flex-wrap: wrap; gap: 6px; }
  .capchip {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    border: 1px solid var(--hair); border-radius: 999px;
    padding: 5px 10px 5px 6px; font-size: 12px; background: #fff; color: var(--ink-soft);
    transition: all .15s ease; user-select: none;
  }
  .capchip .ic { width: 18px; height: 18px; display: inline-flex; }
  .capchip[aria-pressed="false"] { opacity: .4; filter: grayscale(1); }
  .capchip:hover { border-color: var(--accent-line); }

  .classchip {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    border: 1px solid var(--hair); border-radius: 999px;
    padding: 5px 11px; font-size: 12px; background: #fff; color: var(--ink-soft);
    transition: all .15s ease; user-select: none; font-weight: 600;
  }
  .classchip .swatch { width: 9px; height: 9px; border-radius: 50%; }
  .classchip[aria-pressed="false"] { opacity: .4; filter: grayscale(1); }
  .classchip:hover { border-color: var(--accent-line); }

  .clearbtn {
    margin-left: auto; border: 1px solid var(--hair); background: #fff; cursor: pointer;
    font: inherit; font-size: 12.5px; color: var(--ink-soft); padding: 6px 12px; border-radius: 8px;
  }
  .clearbtn:hover { border-color: var(--accent-line); color: var(--accent); }
  .filterstat { font-size: 12px; color: var(--ink-faint); }
  /* consistent, on-brand keyboard focus for all toolbar / ruler controls */
  .seg button:focus-visible, .capchip:focus-visible, .classchip:focus-visible,
  .clearbtn:focus-visible, .ruler .pill:focus-visible, .drawer .close:focus-visible {
    outline: 3px solid var(--accent-line); outline-offset: 2px;
  }

  /* ---------- Phase ruler (mini overview) ---------- */
  .ruler {
    position: sticky; top: 57px; z-index: 35;
    display: flex; gap: 6px; overflow-x: auto; padding: 10px 28px;
    background: #fff; border-bottom: 1px solid var(--hair); scrollbar-width: thin;
  }
  .ruler .pill {
    flex: 0 0 auto; cursor: pointer; border: 1px solid var(--hair); background: #fff;
    font: inherit; font-size: 11.5px; color: var(--ink-soft); padding: 4px 11px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .ruler .pill .n {
    width: 16px; height: 16px; border-radius: 50%; background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center;
  }
  .ruler .pill[data-group="PRE-LAUNCH"] .n { background: var(--hsy-red); }
  .ruler .pill[data-group="LAUNCH"] .n { background: var(--launch-purple); }
  .ruler .pill[data-group="POST-LAUNCH"] .n { background: var(--post-green); }
  .ruler .pill:hover { border-color: var(--accent-line); color: var(--accent); }
  .ruler .pill.placeholder { opacity: .7; }

  /* ---------- Timeline ---------- */
  .scrollhint { padding: 8px 28px 0; font-size: 11.5px; color: var(--ink-faint); }
  .timeline-wrap { padding: 6px 28px 40px; }

  /* group band row above the stage bars.
     No own horizontal padding — it lives inside .timeline-wrap (padding: 0 28px),
     so the group bars stay column-aligned with the timeline below. */
  .groupband { display: flex; gap: 0; padding: 0; }
  .groupseg {
    padding: 0 8px; display: flex; flex-direction: column; justify-content: flex-end;
  }
  .groupseg .gbar {
    border-radius: 8px 8px 0 0; padding: 7px 12px 8px; color: #fff;
    font-size: 12px; font-weight: 800; letter-spacing: .04em; line-height: 1.2;
  }
  .groupseg .gbar .gsub {
    display: block; font-size: 10px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; opacity: .82; margin-bottom: 2px;
  }
  .groupseg[data-group="PRE-LAUNCH"] .gbar { background: var(--hsy-red); }
  .groupseg[data-group="LAUNCH"] .gbar { background: var(--launch-purple); }
  .groupseg[data-group="POST-LAUNCH"] .gbar { background: var(--post-green); }

  .timeline {
    display: flex; gap: 0; overflow-x: auto; padding-bottom: 18px;
    cursor: grab; scroll-behavior: smooth;
  }
  .timeline.grabbing { cursor: grabbing; scroll-behavior: auto; }
  .timeline::-webkit-scrollbar { height: 10px; }
  .timeline::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 999px; }

  .col { flex: 0 0 var(--col-w); display: flex; flex-direction: column; padding: 0 8px; }

  /* phase bar */
  /* Fixed height so every column's header block is the same depth and the
     numbered nodes below line up on a single horizontal row (no stair-step). */
  .bar {
    height: 80px; background: var(--bar); color: var(--bar-ink);
    border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; font-weight: 700; font-size: 13.5px; padding: 8px 14px; line-height: 1.25; gap: 4px;
    overflow: hidden;
  }
  .bar .blabel { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .bar .steptag { font-size: 9.5px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); }
  .bar .asset { font-size: 9.5px; font-weight: 800; color: var(--asset-ink); letter-spacing: .02em; }
  .bar .loop { font-size: 9.5px; font-weight: 800; color: var(--launch-purple); letter-spacing: .02em; }
  .col[data-placeholder="true"] .bar { background: #f1f1f6; color: var(--ink-faint); border: 1px solid var(--hair); }

  /* FROM -> TO band under the stage bar. Equal min-height + clamped text keeps
     every column's header the same depth across the row. */
  .fromto { display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px; margin-top: 8px; align-items: stretch; }
  .fromto .ft {
    border-radius: 7px; padding: 7px 9px; font-size: 10.5px; line-height: 1.4; min-height: 96px;
  }
  .fromto .ftt { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .fromto .ft .lbl { font-size: 8.5px; font-weight: 800; letter-spacing: .12em; margin-bottom: 3px; }
  .fromto .from { background: var(--from-bg); color: var(--ink-soft); border: 1px solid var(--hair); }
  .fromto .from .lbl { color: var(--ink-faint); }
  .fromto .to { background: var(--to-bg); color: var(--ink); border: 1px solid var(--accent-line); }
  .fromto .to .lbl { color: var(--accent); }
  .fromto .ftarrow { display: flex; align-items: center; color: var(--accent); font-weight: 800; font-size: 15px; }
  .fromto.placeholder {
    grid-template-columns: 1fr; margin-top: 8px;
  }
  .fromto.placeholder .ph {
    border: 1px solid var(--hair); border-radius: 7px; padding: 7px 9px; min-height: 96px;
    font-size: 10.5px; color: var(--ink-faint); line-height: 1.45; background: #fbfbfd;
  }
  .fromto.placeholder .ph .lbl { font-size: 8.5px; font-weight: 800; letter-spacing: .12em; margin-bottom: 3px; color: var(--ink-faint); }

  /* numbered node row with continuous arrow */
  .node-wrap { position: relative; height: 46px; display: flex; align-items: center; justify-content: center; margin-top: 4px; }
  .node-wrap::before {
    content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 3px;
    background: linear-gradient(90deg, var(--accent-line), var(--accent)); transform: translateY(-50%);
  }
  .col:first-child .node-wrap::before { left: 50%; }
  .col:last-child  .node-wrap::after {
    content: ""; position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
    border-left: 9px solid var(--accent); border-top: 6px solid transparent; border-bottom: 6px solid transparent;
  }
  .node {
    position: relative; z-index: 2; width: 26px; height: 26px; border-radius: 50%;
    background: #fff; border: 3px solid var(--accent); color: var(--accent);
    font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 4px #fff;
  }
  .col[data-group="PRE-LAUNCH"] .node { border-color: var(--hsy-red); color: var(--hsy-red); }
  .col[data-group="LAUNCH"] .node { border-color: var(--launch-purple); color: var(--launch-purple); }
  .col[data-group="POST-LAUNCH"] .node { border-color: var(--post-green); color: var(--post-green); }

  .lane { display: flex; flex-direction: column; gap: 12px; padding-top: 16px; }
  .lane.empty::after {
    content: "No agents in this step yet"; color: var(--ink-faint); text-align: center;
    font-size: 12px; padding: 14px 8px; border: 1px solid var(--hair); border-radius: var(--radius);
    background: #fbfbfd; line-height: 1.4;
  }
  /* placeholder steps already list their decisions in the FROM→TO note above —
     point there instead of repeating "no named agents on slide". */
  .col[data-placeholder="true"] .lane.empty::after { content: "Agents to be defined — see decisions above"; }

  /* ---------- Agent card ---------- */
  .card {
    position: relative; background: var(--panel); border-radius: var(--radius);
    border: 2px solid var(--accent); box-shadow: var(--shadow); padding: 13px 14px 14px;
    cursor: pointer; transition: opacity .2s ease, transform .15s ease, box-shadow .15s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(20,20,40,.12); }
  .card:focus-visible { outline: 3px solid var(--accent-line); outline-offset: 2px; }
  .card.dimmed { opacity: .12; pointer-events: none; filter: grayscale(.6); }

  /* orchestrator (FlowSuperAgent / SuperAgent) treatment — subtle ring, no left bar */
  .card.orch { border-width: 2px; box-shadow: 0 0 0 3px rgba(161,0,255,.07), var(--shadow); }
  /* AERA service card treatment */
  .card.service { border-color: var(--aera-ink); border-style: solid; background: var(--aera-bg); }

  .card .toprow { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
  .badge {
    font-size: 9.5px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 5px; color: #fff;
  }
  .badge.opt {
    color: var(--ink-soft); background: #f0f0f5; border: 1px solid var(--hair); letter-spacing: .03em;
  }
  /* AI Refinery class badge */
  .rfbadge {
    font-size: 9.5px; font-weight: 800; letter-spacing: .03em;
    padding: 3px 7px 3px 6px; border-radius: 5px; color: #fff;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .rfbadge .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.85); }

  .card h3 { margin: 0 0 5px; font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
  .card .desc {
    margin: 0; font-size: 12.5px; color: var(--ink-soft); line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  /* transformation badge on the card */
  .tbadge {
    display: inline-block; margin-top: 9px; font-size: 9px; font-weight: 800;
    letter-spacing: .05em; text-transform: uppercase; padding: 3px 8px; border-radius: 5px;
  }
  .tbadge.transformed { background: var(--amber-pale); color: var(--amber); }
  .tbadge.enabled { background: var(--blue-pale); color: var(--blue); }
  .card .metric {
    margin-top: 9px; font-size: 12px; font-weight: 700; color: var(--accent);
  }
  .card .caps { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
  .card .caps .ic {
    width: 22px; height: 22px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
    background: #f5f5fa; border: 1px solid var(--hair);
  }
  .card .caps .ic svg { width: 14px; height: 14px; }
  .card .orchhint {
    margin-top: 10px; font-size: 10px; color: var(--accent); font-weight: 700;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .card .workerhint {
    margin-top: 10px; font-size: 10px; color: var(--ink-faint); font-weight: 600;
  }

  /* planner touchpoint band (under a phase lane) */
  .touchband {
    margin-top: 4px; background: var(--accent-soft); border: 1px solid rgba(161,0,255,.22);
    border-radius: 8px; padding: 8px 10px; cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .touchband:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .touchband:focus-visible { outline: 3px solid var(--accent-line); outline-offset: 2px; }
  .touchband .th { display: flex; align-items: center; gap: 7px; }
  .touchband .gicon { font-size: 13px; }
  .touchband .gtitle { font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: .01em; }
  .touchband .gclass {
    margin-left: auto; font-size: 8.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em;
    color: #fff; background: var(--human); padding: 2px 6px; border-radius: 4px;
  }
  .touchband .gdesc { font-size: 10.5px; color: var(--accent); opacity: .85; line-height: 1.4; margin-top: 4px; }

  /* AERA service band (under a phase lane) */
  .aeraband {
    margin-top: 4px; background: var(--aera-bg); border: 1px solid var(--aera-line);
    border-radius: 8px; padding: 8px 10px;
  }
  .aeraband .ah { display: flex; align-items: center; gap: 7px; }
  .aeraband .alabel { font-size: 8.5px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--aera-ink); }
  .aeraband .aclass {
    margin-left: auto; font-size: 8.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .03em;
    color: #fff; background: var(--aera-ink); padding: 2px 6px; border-radius: 4px;
  }
  .aeraband .adesc { font-size: 10.5px; color: var(--aera-ink); line-height: 1.4; margin-top: 4px; }
  .aeraband.placeholder .adesc { font-style: italic; opacity: .8; }

  /* ---------- Legend ---------- */
  .legend {
    margin: 6px 28px 50px; padding: 16px 18px; background: #fff; border: 1px solid var(--hair);
    border-radius: var(--radius);
  }
  .legend h2 { margin: 0 0 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint); }
  .legend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px 22px; }
  .legend-item { display: flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--ink-soft); }
  .legend-item .ic { width: 24px; height: 24px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; background: #f5f5fa; border: 1px solid var(--hair); flex: 0 0 auto; }
  .legend-item .ic svg { width: 15px; height: 15px; }
  .legend .seg-title { margin: 16px 0 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint); padding-top: 14px; border-top: 1px solid var(--hair); }
  .legend .row { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend .row .badge, .legend .row .rfbadge { cursor: default; }
  .legend .tbadge { cursor: default; margin-top: 0; }

  /* ---------- Drawer ---------- */
  .scrim {
    position: fixed; inset: 0; background: rgba(20,20,40,.42); opacity: 0; pointer-events: none;
    transition: opacity .2s ease; z-index: 90;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: 480px; max-width: 94vw;
    background: #fff; box-shadow: -10px 0 40px rgba(20,20,40,.18); z-index: 100;
    transform: translateX(100%); transition: transform .22s ease; overflow-y: auto; padding: 26px 28px 40px;
  }
  .drawer.open { transform: translateX(0); }
  .drawer .close {
    position: absolute; top: 16px; right: 18px; border: 0; background: var(--neutral-100); cursor: pointer;
    width: 32px; height: 32px; border-radius: 8px; font-size: 18px; color: var(--ink-soft);
  }
  .drawer .close:hover { background: var(--neutral-200); color: var(--ink); }
  .drawer .d-badges { display: flex; gap: 8px; align-items: center; margin: 4px 0 14px; flex-wrap: wrap; }
  .drawer h2 { margin: 0 0 4px; font-size: 22px; letter-spacing: -.02em; }
  .drawer .d-phase { font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
  .drawer .d-desc { font-size: 14px; line-height: 1.6; color: var(--ink-soft); margin: 18px 0; }
  .drawer .d-section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-faint);
    margin: 22px 0 10px; font-weight: 700; padding-top: 16px; border-top: 1px solid var(--hair);
  }
  .drawer .d-rfclass {
    background: var(--accent-soft); border: 1px solid var(--accent-line); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 4px;
  }
  .drawer .d-rfclass .rf-name { font-size: 14px; font-weight: 800; color: var(--accent); }
  .drawer .d-rfclass .rf-mean { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; margin-top: 5px; }
  .drawer .d-tooling { display: flex; flex-wrap: wrap; gap: 6px; }
  .drawer .d-tool {
    font-size: 11px; font-weight: 600; color: var(--blue); background: var(--blue-pale);
    border: 1px solid rgba(0,97,194,.2); border-radius: 5px; padding: 4px 9px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .drawer .d-transform { border-radius: 10px; padding: 12px 14px; }
  .drawer .d-transform.transformed { background: var(--amber-pale); }
  .drawer .d-transform.enabled { background: var(--blue-pale); }
  .drawer .d-transform .tbadge { margin-top: 0; }
  .drawer .d-transform .t-note { font-size: 13px; line-height: 1.55; color: var(--ink); margin-top: 8px; }
  .drawer .d-aera {

// group band: one segment per group, spanning its contiguous phases
function buildGroupBand() {
  const band = $("#groupband");
  band.innerHTML = "";
  // group phases by their group id, preserving order
  const order = (JOURNEY.groups || []).map(g => g.id);
  const runs = [];
  JOURNEY.phases.forEach(p => {
    const last = runs[runs.length - 1];
    if (last && last.group === p.group) last.count++;
    else runs.push({ group: p.group, count: 1 });
  });
  runs.forEach(run => {
    const g = (JOURNEY.groups || []).find(x => x.id === run.group) || { id: run.group, label: run.group, sub: run.group };
    const seg = el("div", "groupseg");
    seg.dataset.group = run.group;
    // each phase col is var(--col-w) wide; mirror that with flex-basis math
    seg.style.flex = "0 0 calc(var(--col-w) * " + run.count + ")";
    seg.innerHTML = '<div class="gbar"><span class="gsub">' + esc(g.sub || g.id) + '</span>' + esc(g.label || "") + '</div>';
    band.appendChild(seg);
  });
}

function buildTimeline() {
  const tl = $("#timeline");
  tl.innerHTML = "";
  JOURNEY.phases.forEach(p => {
    const col = el("div", "col");
    col.id = "col-" + p.id;
    col.dataset.group = p.group;
    col.dataset.placeholder = String(!!p.placeholder);

    // stage bar
    const bar = el("div", "bar");
    let barHTML = '<span class="steptag">Step ' + p.step + '</span><span class="blabel">' + esc(p.label) + '</span>';
    if (p.accentureAsset) barHTML += '<span class="asset">✓ Accenture asset</span>';
    if (p.loop) barHTML += '<span class="loop">↺ refines &amp; adjusts</span>';
    if (p.placeholder) barHTML += '<span class="steptag">Placeholder</span>';
    bar.innerHTML = barHTML;
    col.appendChild(bar);

    // FROM -> TO band
    if (p.fromTo) {
      const ft = el("div", "fromto");
      ft.innerHTML =
        '<div class="ft from"><div class="lbl">FROM</div><div class="ftt">' + esc(p.fromTo.from) + '</div></div>' +
        '<div class="ftarrow">→</div>' +
        '<div class="ft to"><div class="lbl">TO</div><div class="ftt">' + esc(p.fromTo.to) + '</div></div>';
      col.appendChild(ft);
    } else if (p.placeholder) {
      const ft = el("div", "fromto placeholder");
      ft.innerHTML = '<div class="ph"><div class="lbl">PLACEHOLDER — NO FROM→TO ON SLIDE</div><div class="ftt">' +
        esc(p.placeholderNote || "No named agents on slide.") + '</div></div>';
      col.appendChild(ft);
    }

    // numbered node + continuous arrow
    const nodeWrap = el("div", "node-wrap");
    nodeWrap.appendChild(el("div", "node", String(p.step)));
    col.appendChild(nodeWrap);

    // lane of agent cards
    const lane = el("div", "lane");
    const agentsHere = JOURNEY.agents.filter(a => a.phaseId === p.id);
    agentsHere.forEach(a => lane.appendChild(buildCard(a)));
    if (agentsHere.length === 0) lane.classList.add("empty");
    col.appendChild(lane);

    // planner touchpoint bands for this phase
    (JOURNEY.touchpoints || [])
      .filter(t => (t.phaseIds || []).includes(p.id))
      .forEach(t => col.appendChild(buildTouchband(t)));

    // AERA band (called-service marker) when the phase declares one
    if (p.aera) col.appendChild(buildAeraBand(p));

    tl.appendChild(col);
  });
}

function isOrchestrator(a) {
  return a.refineryClass === "FlowSuperAgent" || a.refineryClass === "SuperAgent" || a.refineryClass === "orchestrator";
}

function rfBadge(classId) {
  const c = REFINERY_CLASSES[classId];
  if (!c) return '';
  return '<span class="rfbadge" style="background:' + c.color + '" title="' + esc(c.meaning) + '">' +
    '<span class="dot"></span>' + esc(c.label) + '</span>';
}

function tBadge(badge) {
  if (!badge) return '';
  const enabled = /ENABLED/i.test(badge);
  return '<span class="tbadge ' + (enabled ? 'enabled' : 'transformed') + '">' + esc(badge) + '</span>';
}

function skillBadge(skillType) {
  const st = (SKILL_TYPES || {})[skillType]; if (!st) return '';
  return '<span class="skill-badge" style="background:' + st.color + '" title="' + esc(st.meaning) + '">' + esc(st.label) + '</span>';
}

function buildCard(a) {
  const t = NODE_TYPES[a.type] || { label: a.type, color: "#6b7280" };
  const orch = isOrchestrator(a);
  const card = el("div", "card" + (orch ? " orch" : "") +
    (a.aeraSkill ? " aera-skill" : (a.type === "service" ? " service" : "")));
  card.tabIndex = 0;
  card.dataset.id = a.id;
  card.dataset.caps = (a.capabilities || []).join(" ");
  card.dataset.class = a.refineryClass || "";
  card.setAttribute("role", "button");
  card.setAttribute("aria-label", a.title + (a.aeraSkill ? " (Aera skill)" : "") + " — open detail");

  const caps = (a.capabilities || []).map(id => {
    const c = CAPABILITIES[id]; if (!c) return "";
    return '<span class="ic" title="' + esc(c.label) + '">' + glyph(id, c.color) + '</span>';
  }).join("");

  // data-source provenance icons
  const srcIds = cardSources(a);
  const srcs = srcIds.map(id => {
    const c = DATA_SOURCES[id]; if (!c) return "";
    return '<span class="src" title="Data source: ' + esc(c.label) + '">' + sourceIcon(id) + '</span>';
  }).join("");

  // top-row badges: Aera skills lead with AERA SKILL + skill-type, others with node-type
  const topBadges = a.aeraSkill
    ? '<span class="badge skill">Aera Skill</span>' + skillBadge(a.skillType) + rfBadge(a.refineryClass)
    : '<span class="badge" style="background:' + t.color + '">' + esc(t.label) + '</span>' + rfBadge(a.refineryClass);

  // orchestration hint on the compact card
  let orchHint = "";
  if (orch && a.orchestration && a.orchestration.subAgents) {
    orchHint = '<div class="orchhint">⛓ Orchestrates ' + a.orchestration.subAgents.length + ' worker agents — open to see the pipeline</div>';
  } else if (a.orchestration && a.orchestration.role === "worker") {
    orchHint = '<div class="workerhint">worker · ' + esc(a.orchestration.parent || "") +
      (a.orchestration.shared ? ' · shared' : '') + '</div>';
  }

  card.innerHTML =
    '<div class="toprow">' +
      topBadges +
      (a.optional ? '<span class="badge opt">Optional</span>' : '') +
    '</div>' +
    '<h3>' + esc(a.title) + '</h3>' +
    '<p class="desc">' + esc(a.description || "") + '</p>' +
    tBadge(a.transformation && a.transformation.badge) +
    (a.metric ? '<div class="metric">' + esc(a.metric) + '</div>' : '') +
    (caps ? '<div class="caps">' + caps + '</div>' : '') +
    (srcs ? '<div class="srcs"><span class="slabel">Data</span>' + srcs + '</div>' : '') +
    orchHint;

  card.addEventListener("click", () => openDrawer(a));
  card.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openDrawer(a); }
  });

function wireToolbar() {
  $("#clearBtn").addEventListener("click", () => {
    state.caps = new Set(Object.keys(CAPABILITIES));
    state.classes = new Set(usedRefineryClasses());
    document.querySelectorAll(".capchip").forEach(c => c.setAttribute("aria-pressed", "true"));
    document.querySelectorAll(".classchip").forEach(c => c.setAttribute("aria-pressed", "true"));
    applyFilters();
  });
}

function applyFilters() {
  const cards = document.querySelectorAll(".card");
  let hidden = 0;
  cards.forEach(card => {
    const cardCaps = card.dataset.caps ? card.dataset.caps.split(" ") : [];
    const okCaps = cardCaps.length === 0 || cardCaps.some(c => state.caps.has(c));
    const cls = card.dataset.class;
    const okClass = !cls || state.classes.has(cls);
    const visible = okCaps && okClass;
    card.classList.toggle("dimmed", !visible);
    // keep filtered-out cards out of the tab order + hidden from AT
    card.tabIndex = visible ? 0 : -1;
    if (visible) card.removeAttribute("aria-hidden"); else card.setAttribute("aria-hidden", "true");
    if (!visible) hidden++;
  });
  const total = cards.length;
  const allCaps = state.caps.size === Object.keys(CAPABILITIES).length;
  const allClasses = state.classes.size === usedRefineryClasses().length;
  const filtering = !allCaps || !allClasses;
  $("#filterStat").textContent = filtering
    ? (total - hidden) + " of " + total + " shown"
    : total + " agents";
}

// ---- Drag-to-pan + shift-wheel horizontal scroll ----
function wirePan() {
  const tl = $("#timeline");
  let down = false, startX = 0, startScroll = 0, moved = false;
  tl.addEventListener("mousedown", e => {
    if (e.target.closest(".card") || e.target.closest(".touchband")) return;
    down = true; moved = false; startX = e.pageX; startScroll = tl.scrollLeft;
    tl.classList.add("grabbing");
  });
  window.addEventListener("mousemove", e => {
    if (!down) return;
    const dx = e.pageX - startX;
    if (Math.abs(dx) > 3) moved = true;
    tl.scrollLeft = startScroll - dx;
  });
  window.addEventListener("mouseup", () => { down = false; tl.classList.remove("grabbing"); });
  tl.addEventListener("wheel", e => {
    if (e.shiftKey || (Math.abs(e.deltaX) > Math.abs(e.deltaY))) return;
    if (e.deltaY !== 0) { tl.scrollLeft += e.deltaY; e.preventDefault(); }
  }, { passive: false });
  // keep the group band scrolling in lockstep with the timeline (rAF-throttled)
  const band = $("#groupband");
  let bandRaf = 0;
  tl.addEventListener("scroll", () => {
    if (bandRaf) return;
    bandRaf = requestAnimationFrame(() => {
      band.style.transform = "translateX(" + (-tl.scrollLeft) + "px)";
      bandRaf = 0;
    });
  }, { passive: true });
}

/* ---- Slim data & systems infrastructure strip (v2A) ----
   Renders from DATA_SOURCES (grouped by kind) + INFRA. Each chip opens a
   source drawer listing which agents/skills draw on that source. ---- */
function buildFoundation() {
  const root = $("#foundation");
  if (!root || typeof DATA_SOURCES === "undefined") return;
  root.innerHTML = "";

  const head = el("div", "infra-head",
    '<span class="ftitle" id="fdnTitle">' + esc(INFRA.title || "Infrastructure") + '</span>' +
    (INFRA.feedsUp ? '<span class="feeds"><span class="arr">↑</span>' + esc(INFRA.feedsUp) + '</span>' : ''));
  root.appendChild(head);
  if (INFRA.caption) root.appendChild(el("div", "infra-cap", esc(INFRA.caption)));

  const groups = el("div", "infra-groups");
  // preserve declaration order of kinds as first seen in DATA_SOURCES
  const kinds = [];
  Object.values(DATA_SOURCES).forEach(s => { if (!kinds.includes(s.kind)) kinds.push(s.kind); });
  kinds.forEach(kind => {
    const g = el("div", "infra-group");
    const lbl = (INFRA.groupLabels || {})[kind] || kind;
    g.appendChild(el("span", "glab", esc(lbl)));
    Object.entries(DATA_SOURCES).filter(([, s]) => s.kind === kind).forEach(([id, s]) => {
      const chip = el("button", "infra-chip" + (kind === "signal" ? " signal" : ""));
      chip.type = "button";
      chip.dataset.source = id;
      chip.title = s.note || s.label;
      chip.innerHTML = '<span class="ic">' + sourceIcon(id, 15) + '</span>' + esc(s.label);
      chip.addEventListener("click", () => openSourceDrawer(id));
      g.appendChild(chip);
    });
    groups.appendChild(g);
  });
  root.appendChild(groups);
}

// which agents/skills draw on a given source
function consumersOfSource(sourceId) {
  return JOURNEY.agents.filter(a => cardSources(a).includes(sourceId));
}

function openSourceDrawer(sourceId) {
  lastFocused = document.activeElement;
  const s = DATA_SOURCES[sourceId]; if (!s) return;
  const body = $("#drawerBody");
  const users = consumersOfSource(sourceId);
  const userRows = users.map(a => {
    const p = JOURNEY.phases.find(x => x.id === a.phaseId);
    const tag = a.aeraSkill ? "Aera skill" : ((NODE_TYPES[a.type] || {}).label || "agent");
    return '<div class="d-worker"><b>' + esc(a.title) + '</b> · ' + esc(tag) +
      (p ? ' · Step ' + p.step : '') + '</div>';
  }).join("");

  body.innerHTML =
    '<div class="d-phase">' + esc((INFRA.groupLabels || {})[s.kind] || s.kind) + ' · data source</div>' +
    '<h2 id="drawerTitle">' + esc(s.label) + '</h2>' +
    '<div class="d-badges"><span class="badge" style="background:' + s.color + '">' + esc(s.short || s.label) + '</span></div>' +
    (s.note ? '<p class="d-desc">' + esc(s.note) + '</p>' : '') +
    '<div class="d-section-title">Feeds these agents & skills (' + users.length + ')</div>' +
    (userRows || '<div class="d-worker">No agents currently mapped to this source.</div>');

  const drawer = $("#drawer");
  drawer.classList.add("open");
  $("#scrim").classList.add("open");
  setBackgroundInert(true);
  drawer.focus();
}

init();
</script>
